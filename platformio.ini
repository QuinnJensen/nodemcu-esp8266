; PlatformIO monorepo root workspace
; -------------------------------------------
; This file ties together all three sketches so IDEs and CI can
; reference the full project.  Each sketch also has its own
; platformio.ini for standalone builds.
;
; Usage:
;   pio run -e sensors
;   pio run -e water_heater
;   pio run -e uhf_modulator

[platformio]
default_envs = sensors

; ── shared defaults ──────────────────────────────────────────────
[env]
platform  = espressif8266
board     = nodemcuv2
framework = arduino
lib_deps  =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6
    adafruit/Adafruit GFX Library @ ^1.11
    adafruit/Adafruit SSD1306 @ ^2.5
    tzapu/WiFiManager @ ^2.0
board_build.filesystem = littlefs
monitor_speed = 115200
build_flags   = -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

; ── sensors (the_mountain, refactored) ───────────────────────────
[env:sensors]
lib_extra_dirs = lib
build_src_filter = +<../sketches/sensors/src/>
lib_deps =
    ${env.lib_deps}
    paulstoffregen/OneWire @ ^2.3
    milesburton/DallasTemperature @ ^3.11

; ── water_heater ─────────────────────────────────────────────────
[env:water_heater]
build_src_filter = +<../sketches/water_heater/src/>
; No shared lib dependency yet – will be added when refactored

; ── uhf_modulator ────────────────────────────────────────────────
[env:uhf_modulator]
build_src_filter = +<../sketches/uhf_modulator/src/>
; No shared lib dependency yet – will be added when refactored
