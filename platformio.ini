; PlatformIO monorepo root workspace
; -------------------------------------------
; This file ties together all three sketches so IDEs and CI can
; reference the full project.  Each sketch also has its own
; platformio.ini for standalone builds.
;
; Usage:
;   pio run -e sensors
;   pio run -e water_heater
;   pio run -e uhf_modulator

[platformio]
default_envs = sensors
src_dir = sketches

; ── shared defaults ──────────────────────────────────────────────
[env]
platform  = espressif8266
board     = nodemcuv2
framework = arduino
lib_deps  =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6
    adafruit/Adafruit GFX Library @ ^1.11
    adafruit/Adafruit SSD1306 @ ^2.5
    tzapu/WiFiManager @ ^2.0
    paulstoffregen/OneWire @ ^2.3
    milesburton/DallasTemperature @ ^3.11
board_build.filesystem = littlefs
monitor_speed = 115200
build_flags   = -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

; ── sensors ──────────────────────────────────────────────────────
[env:sensors]
lib_extra_dirs = lib
data_dir = sketches/sensors/data
extra_scripts = pre:sketches/sensors/scripts/set_build_version.py
build_src_filter = +<sensors/src/*.cpp> +<sensors/src/*.h>
build_flags =
    ${env.build_flags}
    -DSHARED_LIB_USE_ONEWIRE
    -DSHARED_LIB_USE_WATER_PROBE

; ── water_heater ─────────────────────────────────────────────────
[env:water_heater]
lib_extra_dirs = lib
data_dir = sketches/water_heater/data
extra_scripts = pre:sketches/water_heater/scripts/set_build_version.py
build_src_filter = +<water_heater/src/*.cpp> +<water_heater/src/*.h>
build_flags =
    ${env.build_flags}
    -DSHARED_LIB_USE_ONEWIRE
    '-DSHARED_LIB_DEFAULT_DEVICE_ID="water_heater"'
    '-DSHARED_LIB_DEFAULT_BASE_TOPIC="mountain/water_heater"'

; ── uhf_modulator ────────────────────────────────────────────────
[env:uhf_modulator]
lib_extra_dirs = lib
data_dir = sketches/uhf_modulator/data
extra_scripts = pre:sketches/uhf_modulator/scripts/set_build_version.py
build_src_filter = +<uhf_modulator/src/*.cpp> +<uhf_modulator/src/*.h>
build_flags =
    ${env.build_flags}
    -DSHARED_LIB_USE_ONEWIRE
    '-DSHARED_LIB_DEFAULT_DEVICE_ID="uhf_modulator"'
    '-DSHARED_LIB_DEFAULT_BASE_TOPIC="uhfmod"'
