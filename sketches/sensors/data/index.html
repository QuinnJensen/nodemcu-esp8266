<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sensors</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">S</div>
        <div>
          <h1>Sensors</h1>
          <p>node monitor</p>
        </div>
      </div>
      <div class="nav">
        <button data-page="dashboard" class="active">Dashboard</button>
        <button data-page="temps">Temperature Network</button>
        <button data-page="water">Water Probe</button>
        <button data-page="names">Sensor Names</button>
        <button data-page="wifi">WiFi</button>
        <button data-page="services">MQTT &amp; Prometheus</button>
        <button data-page="files">LittleFS Files</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="title">
          <h2 id="page-title">Dashboard</h2>
          <p id="page-subtitle">Live node overview</p>
        </div>
        <div class="badges">
          <div class="badge"><b id="badge-id">-</b></div>
          <div class="badge">WiFi <b id="badge-wifi">-</b></div>
          <div class="badge">MQTT <b id="badge-mqtt">-</b></div>
          <div class="badge">Heap <b id="badge-heap">-</b></div>
        </div>
      </div>

      <section id="page-dashboard" class="page grid"></section>
      <section id="page-temps"     class="page grid hidden"></section>
      <section id="page-water"     class="page grid hidden"></section>
      <section id="page-names"     class="page grid hidden"></section>
      <section id="page-wifi"      class="page grid hidden"></section>
      <section id="page-services"  class="page grid hidden"></section>
      <section id="page-files"     class="page grid hidden"></section>
    </main>
  </div>

  <!-- File viewer modal -->
  <div id="file-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;padding:2rem;box-sizing:border-box">
    <div style="background:#1c1b19;border:1px solid #333;border-radius:.5rem;max-width:860px;margin:0 auto;height:100%;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;border-bottom:1px solid #333">
        <span id="modal-filename" style="font-family:monospace;font-size:.85rem;color:#ccc"></span>
        <button onclick="closeFileModal()" style="background:none;border:none;color:#888;font-size:1.25rem;cursor:pointer;line-height:1">&times;</button>
      </div>
      <pre id="modal-content" style="flex:1;overflow:auto;padding:1rem;margin:0;font-size:.78rem;line-height:1.5;color:#c8c8c0;white-space:pre-wrap;word-break:break-all"></pre>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
