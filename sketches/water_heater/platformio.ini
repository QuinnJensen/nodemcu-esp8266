; water_heater — standalone PlatformIO build
; Run from this directory:  pio run
;                            pio run --target upload
;
; Note: still uses a monolithic .ino file.  When refactored to
; split .cpp/.h modules, add lib_extra_dirs = ../../lib and
; the shared lib_deps from the sensors sketch.

[platformio]
default_envs = water_heater
src_dir = .

[env:water_heater]
platform  = espressif8266
board     = nodemcuv2
framework = arduino
lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6
    adafruit/Adafruit GFX Library @ ^1.11
    adafruit/Adafruit SSD1306 @ ^2.5
    tzapu/WiFiManager @ ^2.0
    paulstoffregen/OneWire @ ^2.3
    milesburton/DallasTemperature @ ^3.11
board_build.filesystem = littlefs
monitor_speed = 115200
build_flags   = -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
