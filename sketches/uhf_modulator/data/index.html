<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>UHF Modulator</title>
  <style>
:root{--bg:#111315;--panel:#181b1f;--panel2:#1f2429;--text:#e8edf2;--muted:#98a3af;--line:#2c333b;--accent:#87d6c1;--good:#6fbe7a;--bad:#d96c6c;--radius:14px;}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif}
.app{display:grid;grid-template-columns:240px minmax(0,1fr);min-height:100vh}
.sidebar{background:#15181c;border-right:1px solid var(--line);padding:18px;position:sticky;top:0;height:100vh}
.brand h1{margin:0;font-size:18px}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
.nav{display:grid;gap:6px;margin-top:18px}
.nav button{width:100%;text-align:left;background:transparent;color:var(--text);border:1px solid transparent;padding:10px 12px;border-radius:10px;cursor:pointer}
.nav button:hover,.nav button.active{background:var(--panel);border-color:var(--line)}
.main{padding:18px 22px 32px}
.topbar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px}
.title h2{margin:0;font-size:24px}.title p{margin:4px 0 0;color:var(--muted)}
.badges{display:flex;flex-wrap:wrap;gap:8px}
.badge{padding:6px 10px;border:1px solid var(--line);border-radius:999px;background:var(--panel);font-size:12px;color:var(--muted)}
.badge b{color:var(--text)}
.grid{display:grid;gap:14px}.grid.two{grid-template-columns:repeat(2,minmax(0,1fr))}.grid.three{grid-template-columns:repeat(3,minmax(0,1fr))}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
.card h3{margin:0 0 10px}
.kpi{font-size:30px;font-weight:800}
.muted{color:var(--muted)}
.btn{appearance:none;border:none;border-radius:10px;padding:9px 14px;cursor:pointer;background:var(--accent);color:#08221d;font-weight:700}
.btn.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
.btn:disabled{opacity:.5;cursor:wait}
.field{display:grid;gap:5px;margin:6px 0}
.field input,.field select{width:100%;background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:10px;padding:9px 10px}
.code-list{display:grid;gap:6px}
.code-row{display:flex;align-items:center;justify-content:space-between;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:8px 10px;gap:8px}
.code-row .info{flex:1;min-width:0}
.code-row .info .name{font-weight:700}
.code-row .info .meta{font-size:12px;color:var(--muted)}
.console-pane{background:#0b0d10;border:1px solid var(--line);border-radius:10px;padding:8px;height:48vh;min-height:280px;overflow-y:auto;font-family:ui-monospace,Menlo,monospace;font-size:12.5px;line-height:1.45;color:#cfd6dd}
.clog-line{white-space:pre-wrap;word-break:break-word;padding:1px 0}
.clog-line .ts{color:#5e6a76;margin-right:6px}
.clog-line .tag{display:inline-block;min-width:36px;margin-right:6px;font-weight:700;font-size:11px;text-transform:uppercase}
.clog-line.rx .tag{color:#87d6c1}.clog-line.tx .tag{color:#7fb6e6}.clog-line.warn{color:#efc374}.clog-line.warn .tag{color:#efc374}.clog-line.err{color:#f0a2a2}
.console-input{display:flex;gap:8px;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:6px 8px;margin-top:8px}
.console-input input{flex:1;background:transparent;color:var(--text);border:none;outline:none;font-family:ui-monospace,Menlo,monospace}
.hidden{display:none!important}
.mono{font-family:ui-monospace,Menlo,monospace}
.small{font-size:12px}
@media (max-width:980px){
  .app{grid-template-columns:1fr}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line);padding:12px 16px}
  .sidebar .brand{margin-bottom:10px}
  .nav{margin-top:8px;gap:6px;display:flex;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  .nav button{flex-shrink:0;width:auto;padding:8px 12px;font-size:14px}
  .main{padding:10px 14px 32px}
  .topbar{margin-bottom:10px}
  .grid.two,.grid.three{grid-template-columns:1fr}
}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><h1>UHF Modulator</h1><p>433 MHz OOK TX</p></div>
    <div class="nav">
      <button data-page="dashboard" class="active">Dashboard</button>
      <button data-page="codes">Codes</button>
      <button data-page="profiles">Profiles</button>
      <button data-page="temps">Temperatures</button>
      <button data-page="console">Console</button>
      <button data-page="settings">Settings</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="title"><h2 id="page-title">Dashboard</h2><p id="page-subtitle">Live transmitter state</p></div>
      <div class="badges">
        <div class="badge"><b id="badge-id">-</b></div>
        <div class="badge">WiFi <b id="badge-wifi">-</b></div>
        <div class="badge">MQTT <b id="badge-mqtt">-</b></div>
        <div class="badge" id="badge-version">-</div>
      </div>
    </div>
    <section id="page-dashboard" class="page grid"></section>
    <section id="page-codes"     class="page grid hidden"></section>
    <section id="page-profiles"  class="page grid hidden"></section>
    <section id="page-temps"     class="page grid hidden"></section>
    <section id="page-console"   class="page grid hidden"></section>
    <section id="page-settings"  class="page grid hidden"></section>
  </main>
</div>
<script>
const state={status:null,config:null,profiles:null,codes:null,console:{lastSeq:0,timer:null,autoscroll:true},pollTimer:null,page:'dashboard'};
const esc=s=>String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
async function fJ(u){const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw new Error(u);return r.json();}
const postForm=(u,o)=>{const fd=new URLSearchParams();Object.entries(o).forEach(([k,v])=>fd.append(k,v));return fetch(u,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:fd.toString()});};

function renderChrome(){const s=state.status||{};document.getElementById('badge-id').textContent=s.id||'-';document.getElementById('badge-wifi').textContent=s.wifi_connected?'up':'down';document.getElementById('badge-mqtt').textContent=s.mqtt_connected?'up':'down';if(s.build_version)document.getElementById('badge-version').textContent=s.build_version;}

function renderDashboard(){
  const s=state.status||{};
  document.getElementById('page-dashboard').innerHTML=
    `<div class='grid three'>`+
      `<div class='card'><div class='muted'>TX state</div><div class='kpi'>${s.txbusy?'BUSY':'idle'}</div><div class='small muted'>${s.txcount??0} total transmissions</div></div>`+
      `<div class='card'><div class='muted'>Last TX</div><div class='kpi mono' style='font-size:18px;word-break:break-all'>${esc(s.lasttxid||'-')}</div><div class='small muted'>profile ${esc(s.lasttxprofileid||'-')} · ${s.lasttxbits??'-'} bits × ${s.lasttxrepeat??'-'}</div></div>`+
      `<div class='card'><div class='muted'>Stored</div><div class='kpi'>${s.profilecount??0}/${s.codecount??0}</div><div class='small muted'>profiles / codes</div></div>`+
    `</div>`+
    `<div class='grid two'>`+
      `<div class='card'><h3>Quick Send</h3><div class='small muted'>Pick a stored code and transmit it.</div><div id='quick-codes' class='code-list' style='margin-top:10px'></div></div>`+
      `<div class='card'><h3>Status</h3><p><b>SSID:</b> ${esc(s.ssid||'-')}</p><p><b>IP:</b> <span class='mono'>${esc(s.ip||'-')}</span></p><p><b>Heap:</b> ${s.freeheap??0}</p><p><b>Uptime:</b> ${Math.floor((s.uptime_ms||0)/1000)}s</p></div>`+
    `</div>`;
  renderQuickCodes();
}
function renderQuickCodes(){
  const codes=(state.codes||{}).codes||[];
  const el=document.getElementById('quick-codes');if(!el)return;
  el.innerHTML=codes.length?codes.slice(0,10).map(c=>
    `<div class='code-row'><div class='info'><div class='name mono'>${esc(c.id)}</div><div class='meta'>${esc(c.profileId)} · ${c.bits}b × ${c.repeat}</div></div><button class='btn' onclick="txCode('${esc(c.id)}')">TX</button></div>`
  ).join(''):`<div class='small muted'>No codes loaded.</div>`;
}
async function txCode(id){await postForm('/api/tx',{id});setTimeout(refreshAll,400);}
function renderCodes(){
  const codes=(state.codes||{}).codes||[];
  document.getElementById('page-codes').innerHTML=
    `<div class='card' style='grid-column:1/-1'><h3>Stored Codes</h3>`+
      `<div class='code-list'>`+
        (codes.length?codes.map(c=>`<div class='code-row'><div class='info'><div class='name mono'>${esc(c.id)}</div><div class='meta'>profile ${esc(c.profileId)} · value ${c.value} · ${c.bits}b × ${c.repeat}</div></div><button class='btn' onclick="txCode('${esc(c.id)}')">Transmit</button></div>`).join(''):`<div class='small muted'>No codes loaded.</div>`)+
      `</div></div>`;
}
function renderProfiles(){
  const profs=(state.profiles||{}).profiles||[];
  document.getElementById('page-profiles').innerHTML=
    `<div class='card' style='grid-column:1/-1'><h3>Timing Profiles</h3>`+
      `<table style='width:100%;border-collapse:collapse'><thead><tr><th>ID</th><th>pulse µs</th><th>sync H/L</th><th>0 H/L</th><th>1 H/L</th><th>bits</th><th>rep</th></tr></thead><tbody>`+
        (profs.length?profs.map(p=>`<tr><td class='mono'>${esc(p.id)}</td><td>${p.pulse_us}</td><td>${p.sync_high}/${p.sync_low}</td><td>${p.zero_high}/${p.zero_low}</td><td>${p.one_high}/${p.one_low}</td><td>${p.default_bits}</td><td>${p.default_repeat}</td></tr>`).join(''):`<tr><td colspan='7' class='muted'>No profiles loaded.</td></tr>`)+
      `</tbody></table></div>`;
}
function renderTemps(){
  const s=state.status||{};const sensors=s.sensors||[];
  document.getElementById('page-temps').innerHTML=
    `<div class='card' style='grid-column:1/-1'><h3>Optional 1-Wire Sensors</h3>`+
      `<button class='btn secondary' onclick='postScan()'>Rescan</button>`+
      `<table style='width:100%;margin-top:10px;border-collapse:collapse'><thead><tr><th>#</th><th>Name</th><th>Address</th><th>State</th><th>Reading</th></tr></thead><tbody>`+
        (sensors.length?sensors.map(x=>`<tr><td>${x.index}</td><td>${esc(x.name||'-')}</td><td class='mono'>${esc(x.address||'-')}</td><td>${x.connected?'connected':'disc'}</td><td>${x.tempc==null?'-':Number(x.tempc).toFixed(2)+' °C / '+(x.tempc*9/5+32).toFixed(1)+' °F'}</td></tr>`).join(''):`<tr><td colspan='5' class='muted'>No sensors. Connect DS18B20 on D2 if you want optional temperature monitoring.</td></tr>`)+
      `</tbody></table></div>`;
}
async function postScan(){await postForm('/api/sensors/scan',{});setTimeout(refreshAll,1500);}
function renderSettings(){
  const c=state.config||{};
  document.getElementById('page-settings').innerHTML=
    `<div class='card'><h3>MQTT &amp; Prometheus</h3><form onsubmit='return saveServices(event)'>`+
      `<div class='field'><label>MQTT host</label><input name='mqtthost' value='${esc(c.mqtthost||'')}'></div>`+
      `<div class='field'><label>MQTT port</label><input name='mqttport' type='number' value='${c.mqttport??1883}'></div>`+
      `<div class='field'><label>Base topic</label><input name='basetopic' value='${esc(c.basetopic||'')}'></div>`+
      `<div class='field'><label>Device ID</label><input name='deviceid' value='${esc(c.deviceid||'')}'></div>`+
      `<div class='field'><label>Prometheus port</label><input name='prometheusport' type='number' value='${c.prometheusport??9111}'></div>`+
      `<button class='btn' type='submit'>Save</button></form>`+
      `<p class='small muted'>Cmd: <span class='mono'>${esc((c.topics||{}).command||'-')}</span></p></div>`+
    `<div class='card'><h3>Timezone</h3><form onsubmit='return saveTz(event)'><div class='field'><label>POSIX TZ</label><input name='timezone' value='${esc(c.timezone||'')}'></div><button class='btn' type='submit'>Save</button></form></div>`;
}
async function saveServices(ev){ev.preventDefault();const fd=new FormData(ev.target);await postForm('/api/config/services',Object.fromEntries(fd));await refreshAll();return false;}
async function saveTz(ev){ev.preventDefault();const fd=new FormData(ev.target);await postForm('/api/config/time',Object.fromEntries(fd));await refreshAll();return false;}

function renderConsole(){
  document.getElementById('page-console').innerHTML=
    `<div class='card' style='grid-column:1/-1'><h3>Console</h3>`+
    `<div class='console-pane' id='console-pane'></div>`+
    `<form class='console-input' onsubmit='return sendConsole(event)'><span style='color:var(--accent)'>&gt;</span><input id='console-cmd' placeholder='/help or {"command":"status"}'><button class='btn' type='submit'>Send</button></form>`+
    `</div>`;
  startConsolePoll();
}
async function pollConsoleOnce(){try{const d=await fJ('/api/console/log?after='+state.console.lastSeq);if(d.entries)appendConsole(d.entries);if(typeof d.seq==='number')state.console.lastSeq=d.seq;}catch(e){}}
function appendConsole(entries){const pane=document.getElementById('console-pane');if(!pane)return;const f=document.createDocumentFragment();for(const e of entries){const div=document.createElement('div');div.className='clog-line '+(e.type||'info');const ts=e.local||('+'+Math.floor((e.uptime_ms||0)/1000)+'s');div.innerHTML=`<span class='ts'>${ts}</span><span class='tag'>${esc(e.type||'info')}</span><span>${esc(e.msg||'')}</span>`;f.appendChild(div);}pane.appendChild(f);while(pane.children.length>300)pane.removeChild(pane.firstChild);if(state.console.autoscroll)pane.scrollTop=pane.scrollHeight;}
function startConsolePoll(){stopConsolePoll();pollConsoleOnce();state.console.timer=setInterval(pollConsoleOnce,2000);}
function stopConsolePoll(){if(state.console.timer){clearInterval(state.console.timer);state.console.timer=null;}}
async function sendConsole(ev){ev.preventDefault();const inp=document.getElementById('console-cmd');const cmd=inp.value.trim();if(!cmd)return false;if(cmd.toLowerCase()==='/clear'){document.getElementById('console-pane').innerHTML='';inp.value='';return false;}inp.value='';await postForm('/api/console/command',{cmd});setTimeout(pollConsoleOnce,300);return false;}

async function refreshAll(){try{state.config=await fJ('/api/config');state.status=await fJ('/api/status');state.profiles=await fJ('/api/profiles');state.codes=await fJ('/api/codes');renderChrome();renderPages();}catch(e){console.warn(e);}}
function renderPages(){renderDashboard();renderCodes();renderProfiles();renderTemps();renderSettings();showPage(state.page);}
function showPage(name){state.page=name;document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden'));const p=document.getElementById('page-'+name);if(p)p.classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.page===name));const titles={dashboard:['Dashboard','Live transmitter state'],codes:['Codes','Stored codes — pick one to transmit'],profiles:['Profiles','Timing profile definitions'],temps:['Temperatures','Optional 1-Wire DS18B20 sensors'],console:['Console','Recent device events and command entry'],settings:['Settings','MQTT broker, topics, identity, timezone']};document.getElementById('page-title').textContent=(titles[name]||['',''])[0];document.getElementById('page-subtitle').textContent=(titles[name]||['',''])[1];if(name==='console')renderConsole();else stopConsolePoll();}
document.querySelectorAll('.nav button').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.page)));
function pollTick(){refreshAll().finally(()=>state.pollTimer=setTimeout(pollTick,8000));}
refreshAll().finally(()=>state.pollTimer=setTimeout(pollTick,8000));
</script>
</body></html>
